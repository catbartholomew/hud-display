<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass-bg: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.18);
    --glass-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    --text-primary: rgba(255,255,255,0.97);
    --text-secondary: rgba(255,255,255,0.65);
    --text-tertiary: rgba(255,255,255,0.4);
    --radius: 20px;
    --radius-sm: 12px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: #0a0a0f;
  }

  #bg-container { position: fixed; inset: 0; z-index: 0; }

  .bg-slide {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 2.5s ease-in-out;
  }

  .bg-slide.active { opacity: 1; }

  #bg-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: linear-gradient(135deg, rgba(5,10,25,0.45) 0%, rgba(5,10,25,0.3) 50%, rgba(5,10,25,0.5) 100%);
  }

  #app {
    position: relative; z-index: 2;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "clock    clock"
      "left-col right-col";
    gap: 18px;
    padding: 28px;
  }

  #left-col {
    grid-area: left-col;
    display: flex; flex-direction: column; gap: 18px;
    min-height: 0;
  }

  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: var(--glass-shadow);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    padding: 22px 26px;
    position: relative;
    overflow: hidden;
  }

  .glass::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Clock ── */
  #clock-area {
    grid-area: clock;
    background: transparent; border: none; box-shadow: none;
    backdrop-filter: none; -webkit-backdrop-filter: none;
    padding: 0;
    display: flex; flex-direction: column; gap: 2px;
  }
  #clock-area::before { display: none; }

  #date-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3.2vw, 2.6rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }

  #time-display {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(2.8rem, 5.5vw, 4.8rem);
    font-weight: 200;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 30px rgba(0,0,0,0.5);
    line-height: 1;
  }

  #time-display .seconds {
    font-size: 0.55em; font-weight: 300; opacity: 0.7; vertical-align: baseline;
  }

  /* ── Weather ── */
  #weather-area {
    display: flex; flex-direction: column; gap: 16px;
  }

  .section-label {
    font-size: 10px; font-weight: 400;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 4px;
  }

  #current-weather { display: flex; align-items: center; gap: 16px; }

  #current-icon {
    font-size: clamp(2.5rem, 4vw, 3.5rem);
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }

  #current-temp {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(2.4rem, 4.2vw, 3.6rem);
    font-weight: 200; line-height: 1;
    letter-spacing: -0.02em; margin-bottom: 6px;
  }

  #current-desc { font-size: 0.85rem; font-weight: 300; color: var(--text-secondary); margin-top: 2px; }
  #current-feels { font-size: 0.78rem; color: var(--text-tertiary); margin-top: 1px; }

  #forecast-row {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 4px;
  }

  .forecast-day {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-sm);
    padding: 10px 6px; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: background 0.2s;
  }
  .forecast-day:hover { background: rgba(255,255,255,0.11); }
  .forecast-day .day-name { font-size: 10px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); }
  .forecast-day .day-icon { font-size: 1.3rem; line-height: 1; }
  .forecast-day .day-hi { font-size: 0.88rem; font-weight: 400; color: var(--text-primary); }
  .forecast-day .day-lo { font-size: 0.75rem; color: var(--text-tertiary); }
  .forecast-day .day-precip { font-size: 0.68rem; color: rgba(140,190,255,0.75); }

  /* ── Right column ── */
  #right-col {
    grid-area: right-col;
    display: flex; flex-direction: column; gap: 18px;
    min-height: 0;
  }

  #radar-wrapper {
    flex: 1;
    border-radius: var(--radius); overflow: hidden;
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow); min-height: 200px;
  }
  #radar-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ── Monthly Calendar ── */
  #month-cal {
    display: flex; flex-direction: column; gap: 10px;
    flex: 1; min-height: 0;
  }

  #cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2px;
  }

  #cal-month-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem; font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text-primary);
  }

  #cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: 1fr;
    gap: 4px;
    flex: 1;
    min-height: 0;
  }

  .cal-dow {
    text-align: center;
    font-size: 9px; font-weight: 400;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    padding-bottom: 4px;
  }

  .cal-cell {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 8px;
    font-size: clamp(0.7rem, 1.1vw, 0.88rem);
    font-weight: 300;
    color: rgba(255,255,255,0.82);
    transition: background 0.15s;
    cursor: default;
    gap: 2px;
  }

  .cal-cell.other-month { color: rgba(255,255,255,0.28); opacity: 1; }

  .cal-cell.today {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    color: var(--text-primary);
    font-weight: 400;
  }

  .cal-cell.has-holiday { color: var(--text-primary); }

  .cal-cell .holiday-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(140,190,255,0.8);
    flex-shrink: 0;
  }

  .cal-cell .holiday-name {
    font-size: clamp(0.52rem, 0.75vw, 0.65rem);
    color: rgba(140,190,255,0.85);
    line-height: 1.1;
    text-align: center;
    max-width: 90%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    white-space: normal;
  }

  .cal-cell.today .holiday-name { color: rgba(160,210,255,0.95); }

  /* weekend tint */
  .cal-cell.weekend:not(.today) { color: rgba(255,255,255,0.6); }

  /* ── Holidays panel ── */

  .holiday-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    gap: 10px;
  }
  .holiday-row:last-child { border-bottom: none; }
  .holiday-name { font-size: 0.85rem; font-weight: 300; color: var(--text-primary); flex: 1; }
  .holiday-date { font-size: 0.75rem; color: var(--text-tertiary); font-weight: 300; white-space: nowrap; }
  .holiday-countdown {
    font-size: 0.72rem;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 2px 10px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }
  .loading { animation: pulse 1.8s ease-in-out infinite; }
</style>
</head>
<body>

<div id="bg-container">
  <div class="bg-slide active" id="bg0"></div>
  <div class="bg-slide" id="bg1"></div>
</div>
<div id="bg-overlay"></div>

<div id="app">

  <!-- Clock -->
  <div id="clock-area">
    <div id="date-display">Loading...</div>
    <div id="time-display"><span id="hhmm">--:--</span><span class="seconds">:--</span></div>
  </div>

  <!-- Left column: weather + calendar -->
  <div id="left-col">
    <div class="glass" id="weather-area">
      <div class="section-label">Manhattan, KS</div>
      <div id="current-weather">
        <div id="current-icon" class="loading">⛅</div>
        <div>
          <div id="current-temp">--°</div>
          <div id="current-desc">Loading weather...</div>
          <div id="current-feels"></div>
        </div>
      </div>
      <div id="forecast-row">
        <div class="forecast-day loading" style="grid-column:1/-1;text-align:center;font-size:0.8rem;color:var(--text-tertiary);">Loading forecast...</div>
      </div>
    </div>

    <!-- Monthly Calendar -->
    <div class="glass" id="month-cal">
      <div id="cal-header">
        <div id="cal-month-label"></div>
      </div>
      <div id="cal-grid"></div>
    </div>
  </div>

  <!-- Right column: radar + holidays -->
  <div id="right-col">
    <div id="radar-wrapper">
      <iframe
        src="https://embed.windy.com/embed2.html?lat=39.18&lon=-96.57&detailLat=39.18&detailLon=-96.57&width=650&height=450&zoom=8&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=mph&metricTemp=%C2%B0F&radarRange=-1"
        title="Radar - Manhattan, KS area"
        loading="lazy"
      ></iframe>
    </div>
    <!-- Upcoming Holidays -->
    <div class="glass" id="holidays">
      <div class="section-label">Upcoming US Holidays</div>
      <div id="holidays-content"></div>
    </div>
  </div>

</div>

<script>
const CONFIG = {
  bgRotateHours: 2,
  backgrounds: [
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80',
    'https://images.unsplash.com/photo-1465056836041-7f43ac27dcb5?w=1920&q=80',
    'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=1920&q=80',
    'https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80',
    'https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=1920&q=80',
    'https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=1920&q=80',
  ],
  lat: 39.1836,
  lon: -96.5717,
};

// ── Backgrounds ──
(function() {
  const slides = [document.getElementById('bg0'), document.getElementById('bg1')];
  let current = 0;
  const msPerSlot = CONFIG.bgRotateHours * 60 * 60 * 1000;
  const slot = Math.floor(Date.now() / msPerSlot) % CONFIG.backgrounds.length;
  slides[0].style.backgroundImage = `url('${CONFIG.backgrounds[slot]}')`;

  function next() {
    const n = 1 - current;
    const s = Math.floor(Date.now() / msPerSlot) % CONFIG.backgrounds.length;
    slides[n].style.backgroundImage = `url('${CONFIG.backgrounds[s]}')`;
    slides[n].classList.add('active');
    slides[current].classList.remove('active');
    current = n;
  }

  const nextBoundary = Math.ceil(Date.now() / msPerSlot) * msPerSlot;
  setTimeout(() => { next(); setInterval(next, msPerSlot); }, nextBoundary - Date.now());
})();

// ── Clock ──
function updateClock() {
  const now = new Date();
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const d = now.getDate();
  const s = ['th','st','nd','rd'], v = d % 100;
  const suffix = s[(v-20)%10] || s[v] || s[0];
  document.getElementById('date-display').textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${d}${suffix}, ${now.getFullYear()}`;
  let h = now.getHours();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2,'0');
  const sec = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('hhmm').textContent = `${h}:${m} ${ap}`;
  document.querySelector('#time-display .seconds').textContent = `:${sec}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── Weather ──
const WMO_ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'❄️',77:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',
  85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️',
};
const WMO_DESC = {
  0:'Clear sky',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',
  45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  77:'Snow grains',80:'Light showers',81:'Showers',82:'Heavy showers',
  85:'Snow showers',86:'Heavy snow showers',95:'Thunderstorm',96:'Thunderstorm & hail',99:'Severe thunderstorm',
};
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${CONFIG.lat}&longitude=${CONFIG.lon}`
      + `&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      + `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FChicago&forecast_days=7`;
    const data = await (await fetch(url)).json();
    const c = data.current, d = data.daily;
    const code = c.weather_code;
    document.getElementById('current-icon').textContent = WMO_ICONS[code] || '🌡️';
    document.getElementById('current-icon').classList.remove('loading');
    document.getElementById('current-temp').textContent = `${Math.round(c.temperature_2m)}°F`;
    document.getElementById('current-desc').textContent = WMO_DESC[code] || 'Unknown';
    document.getElementById('current-feels').textContent =
      `Feels like ${Math.round(c.apparent_temperature)}°  ·  Wind ${Math.round(c.wind_speed_10m)} mph`;
    const row = document.getElementById('forecast-row');
    row.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const dt = new Date(d.time[i] + 'T12:00:00');
      const precip = d.precipitation_probability_max[i];
      const el = document.createElement('div');
      el.className = 'forecast-day';
      el.innerHTML = `
        <span class="day-name">${i === 0 ? 'Today' : DAYS_SHORT[dt.getDay()]}</span>
        <span class="day-icon">${WMO_ICONS[d.weather_code[i]] || '🌡️'}</span>
        <span class="day-hi">${Math.round(d.temperature_2m_max[i])}°</span>
        <span class="day-lo">${Math.round(d.temperature_2m_min[i])}°</span>
        ${precip > 10 ? `<span class="day-precip">💧${precip}%</span>` : ''}
      `;
      row.appendChild(el);
    }
  } catch(e) {
    document.getElementById('current-desc').textContent = 'Weather unavailable';
    console.error('Weather:', e);
  }
}
loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);

// ── US Holidays ──
function getUSHolidays(year) {
  function nth(y, mo, wd, n) {
    const d = new Date(y, mo-1, 1); let c = 0;
    while (true) { if (d.getDay()===wd){c++;if(c===n)return new Date(d);} d.setDate(d.getDate()+1); }
  }
  function last(y, mo, wd) {
    const d = new Date(y, mo, 0);
    while (d.getDay()!==wd) d.setDate(d.getDate()-1);
    return new Date(d);
  }
  return [
    { name: "New Year's Day",   date: new Date(year,0,1)  },
    { name: "MLK Jr. Day",      date: nth(year,1,1,3)     },
    { name: "Presidents' Day",  date: nth(year,2,1,3)     },
    { name: "Memorial Day",     date: last(year,5,1)      },
    { name: "Juneteenth",       date: new Date(year,5,19) },
    { name: "Independence Day", date: new Date(year,6,4)  },
    { name: "Labor Day",        date: nth(year,9,1,1)     },
    { name: "Columbus Day",     date: nth(year,10,1,2)    },
    { name: "Veterans Day",     date: new Date(year,10,11)},
    { name: "Thanksgiving",     date: nth(year,11,4,4)    },
    { name: "Christmas",        date: new Date(year,11,25)},
  ];
}

// Build a lookup: "YYYY-MM-DD" -> holiday name
function buildHolidayMap(year) {
  const map = {};
  for (const h of getUSHolidays(year)) {
    const key = `${h.date.getFullYear()}-${String(h.date.getMonth()+1).padStart(2,'0')}-${String(h.date.getDate()).padStart(2,'0')}`;
    map[key] = h.name;
  }
  return map;
}

// ── Monthly Calendar ──
function renderMonthCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const todayDate = now.getDate();

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-month-label').textContent = `${MONTH_NAMES[month]} ${year}`;

  // Holiday map for this year and next (in case month wraps - not needed here but clean)
  const holidayMap = { ...buildHolidayMap(year), ...buildHolidayMap(year+1) };

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Day-of-week headers
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (const d of DOW) {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  }

  // First day of month, last day
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  // Fill leading cells from previous month
  for (let i = firstDow - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    const prevMonth = month === 0 ? 12 : month;
    const prevYear = month === 0 ? year - 1 : year;
    const cell = makeCell(day, prevYear, prevMonth, true, holidayMap);
    grid.appendChild(cell);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = makeCell(d, year, month+1, false, holidayMap);
    if (d === todayDate) cell.classList.add('today');
    grid.appendChild(cell);
  }

  // Fill trailing cells
  const totalCells = firstDow + daysInMonth;
  const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  const nextMonth = month === 11 ? 1 : month + 2;
  const nextYear = month === 11 ? year + 1 : year;
  for (let d = 1; d <= trailing; d++) {
    const cell = makeCell(d, nextYear, nextMonth, true, holidayMap);
    grid.appendChild(cell);
  }
}

function makeCell(day, year, month, otherMonth, holidayMap) {
  const el = document.createElement('div');
  el.className = 'cal-cell';
  if (otherMonth) el.classList.add('other-month');

  const key = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const holiday = holidayMap[key];
  const dow = new Date(year, month-1, day).getDay();

  if (dow === 0 || dow === 6) el.classList.add('weekend');

  if (holiday && !otherMonth) {
    el.classList.add('has-holiday');
    el.innerHTML = `<span>${day}</span><span class="holiday-name">${holiday}</span>`;
  } else {
    el.innerHTML = `<span>${day}</span>`;
  }

  return el;
}

renderMonthCalendar();

// Re-render calendar at midnight (handles month rollover too)
// ── Upcoming Holidays ──
function renderHolidays() {
  const container = document.getElementById('holidays-content');
  const now = new Date(); now.setHours(0,0,0,0);
  const year = now.getFullYear();
  const all = [...getUSHolidays(year), ...getUSHolidays(year+1)];
  const upcoming = all.filter(h => h.date >= now).slice(0, 8);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  container.innerHTML = upcoming.map(h => {
    const diff = Math.round((h.date - now) / (1000*60*60*24));
    const countdown = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : `${diff}d`;
    const label = `${DAYS[h.date.getDay()]}, ${MONTHS[h.date.getMonth()]} ${h.date.getDate()}`;
    return `<div class="holiday-row">
      <span class="holiday-name">${h.name}</span>
      <span class="holiday-date">${label}</span>
      <span class="holiday-countdown">${countdown}</span>
    </div>`;
  }).join('');
}

renderHolidays();

function scheduleMidnight() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 5);
  setTimeout(() => { renderMonthCalendar(); renderHolidays(); scheduleMidnight(); }, midnight - now);
}
scheduleMidnight();
</script>
